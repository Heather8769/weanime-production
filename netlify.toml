# Next.js 15 + Netlify Plugin Configuration
[[plugins]]
  package = "@netlify/plugin-nextjs"

# API Routes handled by Next.js serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/___netlify-server-handler"
  status = 200

# SPA fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/___netlify-server-handler"
  status = 200

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@supabase/supabase-js", "sharp"]
