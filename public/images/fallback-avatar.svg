<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="avatarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#avatarGradient)" />
  
  <!-- Avatar icon -->
  <g transform="translate(100, 100)">
    <!-- Head -->
    <circle cx="0" cy="-20" r="25" fill="#ffffff" opacity="0.2"/>
    
    <!-- Body -->
    <path d="M -35 40 Q -35 10 -25 10 L 25 10 Q 35 10 35 40 L 35 50 L -35 50 Z" fill="#ffffff" opacity="0.2"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="160" text-anchor="middle" fill="#ffffff" opacity="0.4" font-family="Arial, sans-serif" font-size="12" font-weight="500">
    Avatar
  </text>
  <text x="100" y="175" text-anchor="middle" fill="#ffffff" opacity="0.3" font-family="Arial, sans-serif" font-size="10">
    Not Available
  </text>
</svg>
