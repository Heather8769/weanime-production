<svg width="320" height="180" viewBox="0 0 320 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="thumbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#thumbGradient)" />
  
  <!-- Video player icon -->
  <g transform="translate(160, 90)">
    <!-- Screen -->
    <rect x="-50" y="-30" width="100" height="60" rx="6" fill="#ffffff" opacity="0.1"/>
    <rect x="-45" y="-25" width="90" height="50" rx="3" fill="#ffffff" opacity="0.05"/>
    
    <!-- Play button -->
    <circle cx="0" cy="0" r="18" fill="#ffffff" opacity="0.2"/>
    <polygon points="-6,-8 -6,8 10,0" fill="#ffffff" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="160" y="140" text-anchor="middle" fill="#ffffff" opacity="0.4" font-family="Arial, sans-serif" font-size="12" font-weight="500">
    Episode Thumbnail
  </text>
  <text x="160" y="155" text-anchor="middle" fill="#ffffff" opacity="0.3" font-family="Arial, sans-serif" font-size="10">
    Not Available
  </text>
</svg>
