<svg width="400" height="600" viewBox="0 0 400 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#coverGradient)" />
  <rect width="100%" height="100%" fill="url(#dots)" />
  
  <!-- Anime icon -->
  <g transform="translate(200, 250)">
    <!-- Film strip -->
    <rect x="-60" y="-40" width="120" height="80" rx="8" fill="#ffffff" opacity="0.1"/>
    <rect x="-50" y="-30" width="100" height="60" rx="4" fill="#ffffff" opacity="0.05"/>
    
    <!-- Play button -->
    <circle cx="0" cy="0" r="25" fill="#ffffff" opacity="0.2"/>
    <polygon points="-8,-12 -8,12 15,0" fill="#ffffff" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="380" text-anchor="middle" fill="#ffffff" opacity="0.4" font-family="Arial, sans-serif" font-size="16" font-weight="500">
    Anime Cover
  </text>
  <text x="200" y="400" text-anchor="middle" fill="#ffffff" opacity="0.3" font-family="Arial, sans-serif" font-size="12">
    Image Not Available
  </text>
</svg>
